# UDP 监听（默认）
bind [::]:53

# TCP 监听
bind-tcp [::]:53


# 配置一个代理
proxy-server socks5://127.0.0.1:65001 -name socks5
# 配置一个中国大陆的域名列表 仅当前文件中的域名使用china解析, 其它一律使用国外解析
domain-set -name chnlist -file ../res/chn-site.txt
# 中国大陆域名使用中国DNS解析，其他域名使用国外DNS解析
domain-rules /domain-set:chnlist/ -nameserver china
# 其它域名使用国外DNS解析
domain-rules /./ -nameserver foreign

# 禁用ipv6
force-AAAA-SOA yes
# 禁用测速
speed-check-mode none
# 启用双栈优选
#dualstack-ip-selection yes

# aliyun dns
server 223.5.5.5 -g china -exclude-from-default-group
# dns pod
server 119.28.28.28 -g china -exclude-from-default-group

# cloudflare dns
server-https https://1.1.1.1/dns-query -proxy socks5 -group foreign
# google dns
server-https https://8.8.8.8/dns-query -proxy socks5 -group foreign
